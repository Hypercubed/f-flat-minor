<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a148c"/>
      <stop offset="100%" style="stop-color:#311b92"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)" stroke="#7c4dff" stroke-width="3"/>
  
  <!-- Stack lines (representing stack-based language) -->
  <g stroke="#b39ddb" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="50" y1="140" x2="150" y2="140"/>
    <line x1="55" y1="125" x2="145" y2="125"/>
    <line x1="60" y1="110" x2="140" y2="110"/>
  </g>
  
  <!-- Flat symbol (♭) stylized -->
  <g fill="#e8eaf6">
    <!-- Vertical stem -->
    <rect x="85" y="45" width="8" height="85" rx="2"/>
    <!-- Top curve -->
    <path d="M 93 55 Q 130 50 130 85 Q 130 110 93 105 L 93 95 Q 115 98 115 85 Q 115 65 93 65 Z"/>
  </g>
  
  <!-- F character -->
  <text x="100" y="165" font-family="monospace" font-size="14" fill="#b39ddb" text-anchor="middle" font-weight="bold">F♭m</text>
</svg>
