version = 0.1
default-task = 'build'

extensions = ['../cmp-extension.js']

[env]
RED = '\033[0;31m'
BLUE = '\033[0;34m'
BIN = './execute.py'
NC = '\033[0m'
GRN = '\033[0;32m'
CHECK = 'printf "  ${GRN}OK${NC} " || printf "  ${RED}FAIL${NC} "'

[[task]]
display = 'none'
name = 'build-deno-compiler'
run = 'chomp -c ../deno/ :disassemble'

[[task]]
name = 'interpret'
run = 'cat ../ff/example.ff | ${{BIN}}'
template = 'cmp'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test'
deps = [
  ':interpret',
  ':ff',
]
serial = true
display = 'none'

[[task]]
name = 'test:tap'
deps = [
    '../go/build/run'
]
serial = true
invalidation = 'always'
validation = 'none'
run = '''
  shopt -s nullglob
  shopt -s extglob
  shopt -s globstar
  for f in ../ff/**/*.test.ffp; do
    # Preprocess with Go, then run with Python
    ../go/build/run --preprocess "$f" | python3 ./execute.py
  done
'''

[[task]]
name = 'ff'
deps = [
    '../ff/##.out',
    'build-deno-compiler',
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  if [ -f ${DEP%.*}.ffp ]; then
    ../deno/build/preprocess ${DEP%.*}.ffp | ${{BIN}} | cmp - $DEP -s && ${{CHECK}};
  fi
  if [ -f ${DEP%.*}.ff ]; then
    cat ${DEP%.*}.ff | ${{BIN}} | cmp - $DEP -s && ${{CHECK}};
  fi
'''
