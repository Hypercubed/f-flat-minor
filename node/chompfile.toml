version = 0.1
default-task = 'build'

extensions = ['../cmp-extension.js']

[env]
RED = '\033[0;31m'
CHECK = 'printf "  ${GRN}OK${NC} " || printf "  ${RED}FAIL${NC} "'
BLUE = '\033[0;34m'
NC = '\033[0m'
GRN = '\033[0;32m'

[[task]]
name = 'build:run'
target = './build/ff-run'
deps = [
  './bin/ff-run.ts',
  './src/**/*.ts',
  '../typescript/core/src/**/*.ts'
]
run = '''
  mkdir -p ./build
  printf '#!/bin/sh\nexec node --experimental-transform-types "$(dirname "$0")/../bin/ff-run.ts" "$@"\n' > ./build/ff-run
  chmod +x ./build/ff-run
'''

[[task]]
name = 'build'
deps = ['build:run']

[[task]]
name = 'test:interpret'
dep = './build/ff-run'
template = 'cmp'
run = './build/ff-run ../ff/example.ff'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test:ffp'
dep = './build/ff-run'
template = 'cmp'
run = './build/ff-run ../ff/hello.ffp'
[task.template-options]
cmp = '../ff/hello.out'

[[task]]
name = 'test:ff'
deps = [
  '../ff/##.out',
  './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-run $i | cmp - $DEP -s && ${{CHECK}};
    ./build/ff-run $i --opt | cmp - $DEP -s && ${{CHECK}};
  done
'''

[[task]]
name = 'test'
deps = [
  'build',
  ':test:interpret',
  ':test:ffp',
  ':test:ff'
]
serial = true
display = 'none'

[[task]]
name = 'bench'
deps = ['build:run']
validation = 'none'
serial = true
run = '''
  hyperfine --warmup 3 -N \
    './build/ff-run ../ff/example.ff'\
    './build/ff-run ../ff/example.ff --opt'
'''

[[task]]
name = 'clean'
validation = 'none'
run = 'rm -rf ./build'
