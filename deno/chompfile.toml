version = 0.1
default-task = 'build'

extensions = ['../cmp-extension.js']

[env]
RED = '\033[0;31m'
CHECK = 'printf "  ${GRN}OK${NC} " || printf "  ${RED}FAIL${NC} "'
BLUE = '\033[0;34m'
NC = '\033[0m'
GRN = '\033[0;32m'
BIN = './build/ff-run'

[[task]]
name = 'build:#'
target = './build/ff-#'
deps = [
  './bin/ff-#.ts',
  './src/**/*.ts',
  '../typescript/core/src/**/*.ts'
]
run = '''
  deno run build:$MATCH
'''

[[task]]
name = 'build'
deps = [
  'build:compile',
  'build:run',
  'build:execute',
  'build:preprocess',
]

[[task]]
name = 'test:compile'
deps = ['./build/ff-compile']
template = 'cmp'
run = './build/ff-compile ../ff/example.ff'
[task.template-options]
cmp = '../ff/example.ffb'

[[task]]
name = 'test:execute'
dep = './build/ff-execute'
template = 'cmp'
run = './build/ff-execute ../ff/example.ffb'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test:interpret'
dep = './build/ff-run'
run = './build/ff-run ../ff/example.ff'
template = 'cmp'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test'
deps = [
    'build',
    ':test:compile',
    ':test:execute',
    ':test:interpret',
    ':test:out',
    ':test:tap'
]
serial = true
display = 'none'

[[task]]
name = 'test:out'
deps = [
    '../ff/##.out',
    './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-run $i | diff --ignore-trailing-space -q - > /dev/null 2>&1 $DEP && ${{CHECK}};
    ./build/ff-run $i --opt | diff --ignore-trailing-space -q - > /dev/null 2>&1 $DEP && ${{CHECK}};
  done
'''

[[task]]
name = 'test:tap'
deps = [
    './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
run = '''
  shopt -s nullglob
  shopt -s extglob
  shopt -s globstar
    prove --exec "$BIN" ../ff/**/*.test.ffp
  prove --exec "$BIN --opt" ../ff/**/*.test.ffp
'''

[[task]]
name = 'clean'
run = '''
  rm -rf ./build
'''

[[task]]
name = 'disassemble'
deps = ['../ff/##.out', '../ff/**/*.*', ':build:compile']
target = '../build/ff-disassemble/##.ff'
display = 'init-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-compile $i --opt --disassemble > $TARGET
  done
'''

[[task]]
name = 'preprocess'
deps = ['../ff/##.out', '../ff/**/*.*', ':build:preprocess']
target = '../build/ff-preprocess/##.ff'
display = 'init-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-preprocess $i > $TARGET
  done
'''

[[task]]
name = 'compile'
deps = ['../ff/##.out', '../ff/**/*.*', ':build:compile']
target = '../build/compiled/##.ffb'
display = 'init-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-compile $i > $TARGET
  done
'''

[[task]]
name = 'bench'
deps = ['build:run', 'build:execute']
validation = 'none'
serial = true
run = '''
  hyperfine --warmup 3 -N \
    './build/ff-run ../ff/example.ff'\
    './build/ff-run ../ff/example.ff --opt'\
    './build/ff-execute ../ff/example.ffb'
'''

[[task]]
name = 'test:out:##'
deps = [
    '../ff/##.out',
    './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-run $i | diff --ignore-trailing-space -q - > /dev/null 2>&1 $DEP && ${{CHECK}};
    ./build/ff-run $i --opt | diff --ignore-trailing-space -q - > /dev/null 2>&1 $DEP && ${{CHECK}};
  done
'''
