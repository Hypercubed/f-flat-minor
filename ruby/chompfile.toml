version = 0.1
default-task = 'build'

extensions = ['../cmp-extension.js']

[env]
RED = '\033[0;31m'
GRN = '\033[0;32m'
BLUE = '\033[0;34m'
CHECK = 'printf "  ${GRN}OK${NC} " || printf "  ${RED}FAIL${NC} "'
BIN = './execute.rb'
NC = '\033[0m'
PP = '../deno/build/ff-preprocess'

[[task]]
name = 'build-deno-preprocess'
run = 'chomp -c ../deno/ build'

[[task]]
display = 'none'
name = 'build-go-precompiler'
run = 'chomp -c ../go/ build:run'

[[task]]
name = 'interpret'
run = 'cat ../ff/example.ff | ${{BIN}}'
template = 'cmp'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test'
deps = [
    ':interpret',
    ':ff',
]
serial = true
display = 'none'

[[task]]
name = 'test:tap'
deps = [
    'build-go-precompiler'
]
serial = true
invalidation = 'always'
validation = 'none'
run = '''
  shopt -s nullglob
  shopt -s extglob
  shopt -s globstar
  prove --exec 'sh ./run-tap-test.sh' ../ff/**/*.test.ffp
'''

[[task]]
name = 'ff'
deps = [
    '../ff/##.out',
    '../deno/build/ff-preprocess',
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  if [ -f ${DEP%.*}.ffp ]; then
    ${{PP}} ${DEP%.*}.ffp | ${{BIN}} | cmp - $DEP -s && ${{CHECK}};
  fi
  if [ -f ${DEP%.*}.ff ]; then
    cat ${DEP%.*}.ff | ${{BIN}} | cmp - $DEP -s && ${{CHECK}};
  fi
'''
