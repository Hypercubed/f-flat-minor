version = 0.1
default-task = 'build'

extensions = ['../cmp-extension.js']

[env]
RED = '\033[0;31m'
CHECK = 'printf "  ${GRN}OK${NC} " || printf "  ${RED}FAIL${NC} "'
BLUE = '\033[0;34m'
NC = '\033[0m'
GRN = '\033[0;32m'
BIN = './build/ff-run'

[[task]]
name = 'build'
deps = [
  'build:compile',
  'build:run',
  'build:execute',
  'build:preprocess',
  'build:repl'
]

[[task]]
name = 'build:#'
target = './build/ff-#'
deps = [
  './bin/ff-#.ts',
  './src/**/*.ts',
  '../typescript/core/src/**/*.ts'
]
run = '''
  mkdir -p ./build
  bun build --compile --outfile ./build/ff-$MATCH ./bin/ff-$MATCH.ts
'''

[[task]]
name = 'test:interpret'
dep = './build/ff-run'
template = 'cmp'
run = './build/ff-run ../ff/example.ff'
[task.template-options]
cmp = '../ff/example.out'

[[task]]
name = 'test:ffp'
dep = './build/ff-run'
template = 'cmp'
run = './build/ff-run ../ff/hello.ffp'
[task.template-options]
cmp = '../ff/hello.out'

[[task]]
name = 'test'
deps = [
  'build',
  ':test:interpret',
  ':test:ffp',
  ':test:out',
  ':test:tap'
]
serial = true
display = 'none'

[[task]]
name = 'test:out'
deps = [
  '../ff/##.out',
  './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
display = 'status-only'
run = '''
  shopt -s nullglob
  shopt -s extglob
  for i in "${DEP%.*}.ff?(p)"; do
    ./build/ff-run $i | diff --ignore-trailing-space -q - $DEP && ${{CHECK}};
    ./build/ff-run $i --opt | diff --ignore-trailing-space -q - $DEP && ${{CHECK}};
  done
'''

[[task]]
name = 'test:tap'
deps = [
  './build/ff-run'
]
serial = true
invalidation = 'always'
validation = 'none'
run = '''
  shopt -s nullglob
  shopt -s extglob
  shopt -s globstar
  prove --exec "$BIN --opt" ../ff/**/*.test.ffp
'''
  
[[task]]
name = 'bench'
deps = ['build']
validation = 'none'
serial = true
run = '''
  hyperfine --warmup 3 -N \
    './build/ff-run ../ff/example.ff'\
    './build/ff-run ../ff/example.ff --opt'
'''

[[task]]
name = 'clean'
validation = 'none'
run = 'rm -rf ./build'
